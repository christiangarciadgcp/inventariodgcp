<h2 mat-dialog-title>Cambiar Contraseña</h2>

<mat-dialog-content>
    <p class="text-secondary small mb-3">Por seguridad, ingrese su contraseña actual antes de establecer la nueva.</p>

    <form [formGroup]="form" (ngSubmit)="guardar()">
        
        <mat-form-field appearance="outline">
            <mat-label>Contraseña Actual</mat-label>
            <input matInput [type]="hideActual ? 'password' : 'text'" formControlName="passwordActual">
            <button mat-icon-button matSuffix (click)="hideActual = !hideActual" type="button">
                <mat-icon>{{hideActual ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Nueva Contraseña</mat-label>
            <input matInput [type]="hideNueva ? 'password' : 'text'" formControlName="nuevaPassword">
            <button mat-icon-button matSuffix (click)="hideNueva = !hideNueva" type="button">
                <mat-icon>{{hideNueva ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Confirmar Nueva Contraseña</mat-label>
            <input matInput [type]="hideConfirmar ? 'password' : 'text'" formControlName="confirmarPassword">
            <button mat-icon-button matSuffix (click)="hideConfirmar = !hideConfirmar" type="button">
                <mat-icon>{{hideConfirmar ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            @if(form.hasError('noCoinciden') && form.get('confirmarPassword')?.touched){
                <mat-error>Las contraseñas no coinciden</mat-error>
            }
        </mat-form-field>

    </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="pb-3 pe-3 gap-2">
    <button mat-button class="btn-cancel px-4 rounded-pill" (click)="cancelar()">Cancelar</button>
    <button mat-raised-button class="btn-confirm px-4 rounded-pill" [disabled]="form.invalid" (click)="guardar()">
        Actualizar
    </button>
</mat-dialog-actions>
