<div class="d-flex justify-content-between align-items-center pe-2 pt-2">
  @if(!ocultarTitulo){
    <h2 mat-dialog-title class="m-0 pb-2" [ngClass]="{'text-danger': colorBoton === 'warn', 'text-primary': colorBoton === 'primary'}">
      {{ titulo }}
    </h2>
  }

</div>

<mat-dialog-content>
  <p class="text-secondary m-0" [innerHTML]="mensaje"></p>

  @if (colorBoton === 'warn'){
    <small class="text-muted d-block mt-2">Esta acción no se puede deshacer.</small>
  }
</mat-dialog-content>

@if (!ocultarBotones) {
  <mat-dialog-actions align="end" class="mt-3">
    <button mat-stroked-button (click)="cerrar(false)" class="btn-cancelar">Cancelar</button>

    <button mat-flat-button [color]="colorBoton" (click)="cerrar(true)" class="btn-confirmar" cdkFocusInitial>
      {{ textoBoton }}
    </button>
  </mat-dialog-actions>
}
