<div class="container px-5 mt-4">

  <div class="d-flex align-items-center gap-3 mb-4">
    <button mat-icon-button class="bg-white shadow-sm text-dark" routerLink="/catalogos">
      <mat-icon style="margin-bottom: 5px;">arrow_back</mat-icon>
    </button>

    <div>
      <h6 class="text-uppercase text-muted mb-1" style="font-size: 0.8rem; letter-spacing: 1px;">Módulo de Productos</h6>
      <h2 class="fw-bold text-dark m-0">Gestión de Marcas</h2>
    </div>

    <div class="d-flex align-items-end ms-auto">
      <button mat-raised-button class="rounded-pill px-4 btn-nuevo" (click)="abrirFormulario()">
        <mat-icon class="me-2">add_business</mat-icon> Nueva Marca
      </button>
    </div>
  </div>

  <mat-card class="custom-card">
    <table mat-table [dataSource]="dataSource" matSort class="w-100">


      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> N° </th>
        <td mat-cell *matCellDef="let element" class="ps-4 text-secondary">
          {{ element.idMarca }}
        </td>
      </ng-container>

      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Nombre Marca </th>
        <td mat-cell *matCellDef="let element">
          <div class="d-flex align-items-center">
            <div class="bg-light rounded-circle d-flex align-items-center justify-content-center me-3"
                 style="width: 35px; height: 35px; color: #5c6bc0;">
              <mat-icon style="font-size: 15px; width: 15px; height: 15px;"><i class="bi bi-substack"></i></mat-icon>
            </div>
            <span class="fw-bold">{{element.nombremarca}}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef mat-sort-header> Estado </th>
        <td mat-cell *matCellDef="let element">
          @if (element.activo) {
            <span class="badge rounded-pill bg-success-subtle text-success border border-success-subtle">
                            <mat-icon class="icon-tiny align-middle me-1">check_circle</mat-icon> Activa
                        </span>
          } @else {
            <span class="badge rounded-pill bg-danger-subtle text-danger border border-danger-subtle">
                            <mat-icon class="icon-tiny align-middle me-1">cancel</mat-icon> Inactiva
                        </span>
          }
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef class="text-center pe-4"> Acciones </th>
        <td mat-cell *matCellDef="let element" class="col-acciones">

          <button mat-icon-button class="action-btn" color="primary" matTooltip="Editar Marca" (click)="abrirFormulario(element)">
            <mat-icon class="icon-acciones align-middle me-1">edit_note</mat-icon>
          </button>

          @if (element.activo) {
            <button mat-icon-button class="action-btn icon-success" matTooltip="Desactivar Marca" (click)="desactivarMarca(element.idMarca)">
              <mat-icon class="icon-acciones align-middle">toggle_on</mat-icon>
            </button>
          } @else {
            <button mat-icon-button class="action-btn restore icon-danger" matTooltip="Reactivar Marca" (click)="reactivarMarca(element.idMarca)">
              <mat-icon class="icon-acciones align-middle">toggle_off</mat-icon>
            </button>
          }

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover-row"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center py-5" colspan="5">
          <div class="d-flex flex-column align-items-center justify-content-center text-muted">
            <mat-icon style="font-size: 40px; width: 40px; height: 40px;" class="mb-2">domain_disabled</mat-icon>
            <span>No hay marcas registradas</span>
          </div>
        </td>
      </tr>
    </table>

    <mat-paginator [pageSizeOptions]="[10, 25, 50]"
                   showFirstLastButtons
                   aria-label="Seleccionar página">
    </mat-paginator>

  </mat-card>
</div>
